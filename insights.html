<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#03040a; --surface:#080c18; --card:#0b0f1e;
  --a1:#7c3aff; --a2:#06b6d4; --a3:#f0abfc; --a4:#34d399; --a5:#fb923c;
  --red:#f87171; --text:#f1f5f9; --muted:#64748b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.18;animation:drift 18s ease-in-out infinite alternate;}
.o1{width:700px;height:700px;background:radial-gradient(circle,#7c3aff,transparent 70%);top:-20%;left:-15%;}
.o2{width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-10%;right:-10%;animation-delay:-6s;}
.o3{width:350px;height:350px;background:radial-gradient(circle,#34d399,transparent 70%);top:50%;left:50%;animation-delay:-11s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}50%{transform:translate(25px,-20px) scale(1.05);}100%{transform:translate(-10px,35px) scale(0.95);}}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:150px;}

/* SHELL */
.shell{position:relative;z-index:10;display:grid;grid-template-rows:auto 1fr;min-height:100vh;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 36px;background:rgba(8,12,24,0.88);border-bottom:1px solid rgba(124,58,255,0.15);backdrop-filter:blur(24px);position:sticky;top:0;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-hex{width:36px;height:36px;position:relative;display:flex;align-items:center;justify-content:center;}
.nav-hex svg{position:absolute;inset:0;width:100%;height:100%;}
.nav-hex-inner{position:relative;z-index:1;font-size:15px;}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-tag{font-size:9px;padding:4px 10px;border-radius:20px;background:rgba(124,58,255,.1);border:1px solid rgba(124,58,255,.25);color:var(--a3);letter-spacing:.15em;text-transform:uppercase;}
.btn-back{padding:6px 14px;background:rgba(124,58,255,0.08);border:1px solid rgba(124,58,255,0.2);border-radius:8px;color:var(--a3);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-back:hover{background:rgba(124,58,255,0.15);}

/* MAIN */
main{padding:36px 36px 60px;display:flex;flex-direction:column;gap:28px;}

/* ERROR STATE */
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 20px;text-align:center;}
.error-icon{font-size:48px;opacity:.5;}
.error-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--muted);}
.error-sub{font-size:11px;color:var(--muted);line-height:1.8;}

/* SUMMARY CARDS */
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.s-card{background:linear-gradient(160deg,rgba(11,15,30,.97),rgba(8,12,24,.99));border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .25s,transform .2s;animation:fadeUp .5s cubic-bezier(.34,1.56,.64,1) both;}
.s-card:hover{transform:translateY(-2px);}
.s-card::before{content:'';position:absolute;top:-1px;left:-1px;width:18px;height:18px;border-top:2px solid var(--a1);border-left:2px solid var(--a1);border-radius:14px 0 0 0;}
.s-card:nth-child(1){animation-delay:.05s;}.s-card:nth-child(2){animation-delay:.1s;}.s-card:nth-child(3){animation-delay:.15s;}.s-card:nth-child(4){animation-delay:.2s;}
.s-label{font-size:8px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;}
.s-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
.s-val.up{background:linear-gradient(90deg,var(--a4),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-val.down{background:linear-gradient(90deg,var(--red),#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-val.neutral{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-sub{font-size:9px;color:var(--muted);margin-top:5px;}

/* PANEL */
.panel{background:linear-gradient(160deg,rgba(11,15,30,.97),rgba(8,12,24,.99));border:1px solid rgba(124,58,255,.15);border-radius:18px;overflow:hidden;animation:fadeUp .5s cubic-bezier(.34,1.56,.64,1) both;position:relative;}
.panel::before,.panel::after{content:'';position:absolute;width:18px;height:18px;pointer-events:none;}
.panel::before{top:-1px;left:-1px;border-top:2px solid var(--a1);border-left:2px solid var(--a1);border-radius:18px 0 0 0;}
.panel::after{top:-1px;right:-1px;border-top:2px solid var(--a2);border-right:2px solid var(--a2);border-radius:0 18px 0 0;}
.panel-head{display:flex;align-items:center;gap:12px;padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,.04);}
.panel-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;background:linear-gradient(90deg,var(--text),rgba(241,245,249,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.panel-body{padding:22px 24px 26px;display:flex;flex-direction:column;gap:16px;}

/* CHART CONTAINER */
.chart-wrap{position:relative;height:320px;width:100%;}

/* PRODUCTS TABLE */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(255,255,255,.05);}
table{width:100%;border-collapse:collapse;font-size:10px;}
thead tr{background:rgba(124,58,255,.08);}
th{padding:10px 14px;text-align:left;color:var(--a3);letter-spacing:.1em;text-transform:uppercase;font-size:8px;border-bottom:1px solid rgba(255,255,255,.06);}
td{padding:10px 14px;color:var(--text);border-bottom:1px solid rgba(255,255,255,.03);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(124,58,255,.04);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:500;}
.badge-up{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--a4);}
.badge-down{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);}
.badge-flat{background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.2);color:var(--muted);}

/* PERIOD SELECTOR */
.period-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.period-label{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}
.period-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.period-btn.active,.period-btn:hover{border-color:rgba(124,58,255,.5);background:rgba(124,58,255,.1);color:var(--a3);}

/* TOP/BOTTOM GRID */
.tb-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.tb-panel{background:rgba(0,0,0,.2);border-radius:12px;padding:16px;}
.tb-title{font-size:8px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.tb-title.up{color:var(--a4);}
.tb-title.down{color:var(--red);}
.tb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.tb-item:last-child{border-bottom:none;}
.tb-pid{font-size:10px;color:var(--text);}
.tb-pct{font-family:'Bebas Neue',sans-serif;font-size:16px;}
.tb-pct.up{color:var(--a4);}
.tb-pct.down{color:var(--red);}


/* RECOMMENDATIONS */
.rec-section{display:flex;flex-direction:column;gap:10px;}
.rec-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;transition:transform .2s;}
.rec-item:hover{transform:translateX(4px);}
.rec-item.buy-more{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);}
.rec-item.buy-less{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.18);}
.rec-item.stable{background:rgba(100,116,139,.05);border:1px solid rgba(100,116,139,.15);}
.rec-icon{font-size:20px;flex-shrink:0;width:36px;text-align:center;}
.rec-body{flex:1;}
.rec-pid{font-size:11px;color:var(--text);margin-bottom:3px;}
.rec-action{font-size:10px;line-height:1.6;}
.rec-action.buy-more{color:var(--a4);}
.rec-action.buy-less{color:var(--red);}
.rec-action.stable{color:var(--muted);}
.rec-pills{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
.rec-pill{padding:2px 8px;border-radius:20px;font-size:9px;letter-spacing:.08em;}
.pill-units-more{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--a4);}
.pill-units-less{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);}
.pill-pct-more{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);color:var(--a2);}
.pill-pct-less{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);color:var(--a5);}
.pill-stable{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2);color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid rgba(6,182,212,.3);border-top-color:var(--a2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
</div>
<div class="scanlines"></div><div class="grain"></div>

<div class="shell">
  <nav>
    <div class="nav-brand">
      <div class="nav-hex">
        <svg viewBox="0 0 48 48" fill="none"><polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="none" stroke="url(#hg)" stroke-width="1.5"/><polygon points="24,9 38,17 38,31 24,39 10,31 10,17" fill="rgba(124,58,255,0.1)" stroke="rgba(124,58,255,0.3)" stroke-width="1"/><defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aff"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs></svg>
        <div class="nav-hex-inner">📊</div>
      </div>
      <div class="nav-title">Sales Insights</div>
    </div>
    <div class="nav-right">
      <span class="nav-tag" id="nav-period">— vs —</span>
      <a class="btn-back" onclick="window.close()">← Back to Dashboard</a>
    </div>
  </nav>

  <main id="main-content">
    <!-- filled by JS -->
  </main>
</div>

<script>
// ── Parse CSV ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i]?.trim() ?? '');
    return obj;
  });
}

// ── Main ──────────────────────────────────────────────────────────────────────
const forecastCSV    = sessionStorage.getItem('insightsForecastCSV');
const historicalCSV  = sessionStorage.getItem('insightsHistoricalCSV');
const forecastMonths = parseInt(sessionStorage.getItem('insightsForecastMonths') || '3');

const main = document.getElementById('main-content');

if (!forecastCSV || !historicalCSV) {
  main.innerHTML = `
    <div class="error-state">
      <div class="error-icon">📭</div>
      <div class="error-title">No Data Found</div>
      <div class="error-sub">Please run a forecast from the dashboard first,<br>then click "View Insights".</div>
    </div>`;
} else {
  buildInsights();
}

function buildInsights() {
  const forecastRows  = parseCSV(forecastCSV);   // product_id, forecast_month, predicted_purchases
  const historicalRows = parseCSV(historicalCSV); // month, product_id, number_of_product_purchases, ...

  // ── Aggregate historical per product per month ────────────────────────────
  // Group: { product_id -> [ {month, purchases} ] } sorted by month
  const histMap = {};
  historicalRows.forEach(r => {
    const pid = r.product_id;
    const purchases = parseFloat(r.number_of_product_purchases) || 0;
    const month = r.month?.trim();
    if (!pid || !month) return;
    if (!histMap[pid]) histMap[pid] = [];
    histMap[pid].push({ month, purchases });
  });
  // Sort each product's history by month
  Object.keys(histMap).forEach(pid => {
    histMap[pid].sort((a, b) => a.month.localeCompare(b.month));
  });

  // ── Aggregate forecast per product ───────────────────────────────────────
  // { product_id -> [ {month, purchases} ] }
  const fcMap = {};
  forecastRows.forEach(r => {
    const pid = r.product_id;
    const purchases = parseFloat(r.predicted_purchases) || 0;
    const month = r.forecast_month?.trim();
    if (!pid || !month) return;
    if (!fcMap[pid]) fcMap[pid] = [];
    fcMap[pid].push({ month, purchases });
  });

  // ── For each product: compare last N historical months vs forecast months ──
  // N = forecastMonths (same window)
  const products = Object.keys(fcMap);

  const productStats = products.map(pid => {
    const hist = histMap[pid] || [];
    const fc   = fcMap[pid]   || [];

    // Take last `forecastMonths` months from historical
    const lastHist = hist.slice(-forecastMonths);
    const histTotal = lastHist.reduce((s, r) => s + r.purchases, 0);
    const fcTotal   = fc.reduce((s, r) => s + r.purchases, 0);

    const histAvg = lastHist.length ? histTotal / lastHist.length : 0;
    const fcAvg   = fc.length       ? fcTotal   / fc.length       : 0;

    const pctChange = histAvg !== 0
      ? ((fcAvg - histAvg) / histAvg) * 100
      : fcAvg > 0 ? 100 : 0;

    const histMonths = lastHist.map(r => r.month);
    const fcMonths   = fc.map(r => r.month);

    return {
      pid,
      histTotal: Math.round(histTotal),
      fcTotal:   Math.round(fcTotal),
      histAvg:   Math.round(histAvg * 10) / 10,
      fcAvg:     Math.round(fcAvg   * 10) / 10,
      pctChange: Math.round(pctChange * 10) / 10,
      histMonths,
      fcMonths,
      histValues: lastHist.map(r => r.purchases),
      fcValues:   fc.map(r => r.purchases),
    };
  }).sort((a, b) => b.pctChange - a.pctChange);

  // ── Purchase Recommendations ─────────────────────────────────────────────
  // Built after DOM render via a small timeout so #rec-list exists
  function buildRecs() {
    const list = document.getElementById('rec-list');
    if (!list) return;
    const STABLE_THRESHOLD = 3; // % change within ±3% = stable
    list.innerHTML = productStats.map(p => {
      const diff     = Math.round(Math.abs(p.fcAvg - p.histAvg) * 10) / 10;
      const sign     = p.pctChange > 0 ? '+' : '-';
      const absPct   = Math.abs(p.pctChange);
      const isStable = absPct <= STABLE_THRESHOLD;

      if (isStable) {
        return `<div class="rec-item stable">
          <div class="rec-icon">→</div>
          <div class="rec-body">
            <div class="rec-pid">${p.pid}</div>
            <div class="rec-action stable">Sales expected to remain stable — maintain current purchase quantity.</div>
            <div class="rec-pills">
              <span class="rec-pill pill-stable">~${absPct}% change</span>
            </div>
          </div>
        </div>`;
      } else if (p.pctChange > 0) {
        return `<div class="rec-item buy-more">
          <div class="rec-icon">📈</div>
          <div class="rec-body">
            <div class="rec-pid">${p.pid}</div>
            <div class="rec-action buy-more">Buy more — demand is expected to increase. Order <strong>~${diff} additional units/month</strong> above your usual quantity.</div>
            <div class="rec-pills">
              <span class="rec-pill pill-units-more">+${diff} units/mo</span>
              <span class="rec-pill pill-pct-more">+${absPct}% increase</span>
            </div>
          </div>
        </div>`;
      } else {
        return `<div class="rec-item buy-less">
          <div class="rec-icon">📉</div>
          <div class="rec-body">
            <div class="rec-pid">${p.pid}</div>
            <div class="rec-action buy-less">Buy less — demand is expected to drop. Reduce orders by <strong>~${diff} units/month</strong> to avoid overstock.</div>
            <div class="rec-pills">
              <span class="rec-pill pill-units-less">-${diff} units/mo</span>
              <span class="rec-pill pill-pct-less">-${absPct}% decrease</span>
            </div>
          </div>
        </div>`;
      }
    }).join('');
  }

  // ── Summary numbers ───────────────────────────────────────────────────────
  const totalHistUnits = productStats.reduce((s, p) => s + p.histTotal, 0);
  const totalFcUnits   = productStats.reduce((s, p) => s + p.fcTotal, 0);
  const overallPct     = totalHistUnits !== 0
    ? ((totalFcUnits - totalHistUnits) / totalHistUnits * 100).toFixed(1)
    : '—';
  const gainers  = productStats.filter(p => p.pctChange > 0).length;
  const losers   = productStats.filter(p => p.pctChange < 0).length;

  // Period label
  const allHistMonths = [...new Set(productStats.flatMap(p => p.histMonths))].sort();
  const allFcMonths   = [...new Set(productStats.flatMap(p => p.fcMonths))].sort();
  const periodFrom = allHistMonths[0] || '—';
  const periodTo   = allFcMonths[allFcMonths.length - 1] || '—';
  document.getElementById('nav-period').textContent =
    `${allHistMonths[0] || '?'} → ${allFcMonths[allFcMonths.length-1] || '?'}`;

  const overallDir = parseFloat(overallPct) > 0 ? 'up' : parseFloat(overallPct) < 0 ? 'down' : 'neutral';
  const overallSign = parseFloat(overallPct) > 0 ? '+' : '';

  // ── Render ────────────────────────────────────────────────────────────────
  main.innerHTML = `
    <!-- SUMMARY BAR -->
    <div class="summary-bar">
      <div class="s-card">
        <div class="s-label">Overall Change</div>
        <div class="s-val ${overallDir}">${overallSign}${overallPct}%</div>
        <div class="s-sub">across all products</div>
      </div>
      <div class="s-card">
        <div class="s-label">Historical Units</div>
        <div class="s-val neutral">${totalHistUnits.toLocaleString()}</div>
        <div class="s-sub">last ${forecastMonths} months</div>
      </div>
      <div class="s-card">
        <div class="s-label">Forecast Units</div>
        <div class="s-val neutral">${totalFcUnits.toLocaleString()}</div>
        <div class="s-sub">next ${forecastMonths} months</div>
      </div>
      <div class="s-card">
        <div class="s-label">Products</div>
        <div class="s-val neutral">${products.length}</div>
        <div class="s-sub"><span style="color:var(--a4)">▲${gainers}</span> up · <span style="color:var(--red)">▼${losers}</span> down</div>
      </div>
    </div>

    <!-- CHART -->
    <div class="panel" style="animation-delay:.22s">
      <div class="panel-head">
        <div class="panel-icon" style="background:rgba(124,58,255,.1);border:1px solid rgba(124,58,255,.25);">📈</div>
        <div class="panel-title">Historical vs Forecast — Avg Monthly Units</div>
      </div>
      <div class="panel-body">
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>
    </div>

    <!-- TOP / BOTTOM -->
    <div class="panel" style="animation-delay:.3s">
      <div class="panel-head">
        <div class="panel-icon" style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);">🏆</div>
        <div class="panel-title">Top & Bottom Products</div>
      </div>
      <div class="panel-body">
        <div class="tb-grid">
          <div class="tb-panel">
            <div class="tb-title up">▲ Biggest Gainers</div>
            ${productStats.slice(0, 5).filter(p => p.pctChange >= 0).map(p => `
              <div class="tb-item">
                <span class="tb-pid">${p.pid}</span>
                <span class="tb-pct up">+${p.pctChange}%</span>
              </div>`).join('') || '<div style="color:var(--muted);font-size:10px;">No gainers</div>'}
          </div>
          <div class="tb-panel">
            <div class="tb-title down">▼ Biggest Drops</div>
            ${[...productStats].reverse().slice(0, 5).filter(p => p.pctChange < 0).map(p => `
              <div class="tb-item">
                <span class="tb-pid">${p.pid}</span>
                <span class="tb-pct down">${p.pctChange}%</span>
              </div>`).join('') || '<div style="color:var(--muted);font-size:10px;">No drops</div>'}
          </div>
        </div>
      </div>
    </div>

    <!-- PURCHASE RECOMMENDATIONS -->
    <div class="panel" style="animation-delay:.34s">
      <div class="panel-head">
        <div class="panel-icon" style="background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.25);">🛒</div>
        <div class="panel-title">Purchase Recommendations</div>
      </div>
      <div class="panel-body">
        <div class="rec-section" id="rec-list"><!-- filled by JS --></div>
      </div>
    </div>

    <!-- FULL TABLE -->
    <div class="panel" style="animation-delay:.38s">
      <div class="panel-head">
        <div class="panel-icon" style="background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);">📋</div>
        <div class="panel-title">All Products Breakdown</div>
      </div>
      <div class="panel-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Product ID</th>
              <th>Hist. Total</th>
              <th>Hist. Avg/mo</th>
              <th>Forecast Total</th>
              <th>Forecast Avg/mo</th>
              <th>Change</th>
              <th>Trend</th>
            </tr></thead>
            <tbody>
              ${productStats.map(p => {
                const dir   = p.pctChange > 0 ? 'up' : p.pctChange < 0 ? 'down' : 'flat';
                const sign  = p.pctChange > 0 ? '+' : '';
                const badge = dir === 'up'
                  ? `<span class="badge badge-up">▲ Increase</span>`
                  : dir === 'down'
                  ? `<span class="badge badge-down">▼ Decrease</span>`
                  : `<span class="badge badge-flat">→ Stable</span>`;
                return `<tr>
                  <td><strong>${p.pid}</strong></td>
                  <td>${p.histTotal.toLocaleString()}</td>
                  <td>${p.histAvg}</td>
                  <td>${p.fcTotal.toLocaleString()}</td>
                  <td>${p.fcAvg}</td>
                  <td style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:${dir==='up'?'var(--a4)':dir==='down'?'var(--red)':'var(--muted)'}">${sign}${p.pctChange}%</td>
                  <td>${badge}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  // ── Chart.js ──────────────────────────────────────────────────────────────
  // Top 5 gainers + Top 5 drops by % change — same as Top & Bottom section
  const gainers5 = [...productStats].filter(p => p.pctChange > 0).slice(0, 5);
  const drops5   = [...productStats].slice().reverse().filter(p => p.pctChange < 0).slice(0, 5);
  const topProducts = [...gainers5, ...drops5]
    .filter((p, i, arr) => arr.findIndex(x => x.pid === p.pid) === i);

  const labels   = topProducts.map(p => p.pid);
  const histData = topProducts.map(p => p.histAvg);
  const fcData   = topProducts.map(p => p.fcAvg);

  // ── Divider plugin: vertical line + labels between gainers & drops ─────────
  const dividerPlugin = {
    id: 'sectionDivider',
    afterDraw(chart) {
      const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
      const gCount = gainers5.length;
      if (gCount === 0 || drops5.length === 0) return;

      // midpoint between last gainer bar and first drop bar
      const lastGainerX  = x.getPixelForValue(gCount - 1);
      const firstDropX   = x.getPixelForValue(gCount);
      const midX = (lastGainerX + firstDropX) / 2;

      // dashed divider line
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.moveTo(midX, top);
      ctx.lineTo(midX, bottom);
      ctx.stroke();

      // "▲ TOP 5 GAINERS" label
      ctx.font = '600 9px JetBrains Mono';
      ctx.fillStyle = 'rgba(52,211,153,0.8)';
      ctx.textAlign = 'center';
      ctx.fillText('▲ TOP 5 GAINERS', (chart.chartArea.left + midX) / 2, top - 8);

      // "▼ TOP 5 DROPS" label
      ctx.fillStyle = 'rgba(248,113,113,0.8)';
      ctx.fillText('▼ TOP 5 DROPS', (midX + chart.chartArea.right) / 2, top - 8);

      ctx.restore();
    }
  };

  new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: `Historical Avg (last ${forecastMonths}mo)`,
          data: histData,
          backgroundColor: topProducts.map(p => p.pctChange >= 0 ? 'rgba(124,58,255,0.55)' : 'rgba(124,58,255,0.35)'),
          borderColor:     topProducts.map(p => p.pctChange >= 0 ? 'rgba(124,58,255,0.9)'  : 'rgba(124,58,255,0.6)'),
          borderWidth: 1.5,
          borderRadius: 6,
        },
        {
          label: `Forecast Avg (next ${forecastMonths}mo)`,
          data: fcData,
          backgroundColor: topProducts.map(p => p.pctChange >= 0 ? 'rgba(52,211,153,0.55)' : 'rgba(248,113,113,0.45)'),
          borderColor:     topProducts.map(p => p.pctChange >= 0 ? 'rgba(52,211,153,0.9)'  : 'rgba(248,113,113,0.8)'),
          borderWidth: 1.5,
          borderRadius: 6,
        }
      ]
    },
    plugins: [dividerPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 20 } },
      plugins: {
        legend: {
          labels: {
            color: '#94a3b8',
            font: { family: 'JetBrains Mono', size: 10 },
            boxWidth: 12,
          }
        },
        tooltip: {
          backgroundColor: '#0b0f1e',
          borderColor: 'rgba(124,58,255,.3)',
          borderWidth: 1,
          titleColor: '#f0abfc',
          bodyColor: '#f1f5f9',
          titleFont: { family: 'JetBrains Mono', size: 10 },
          bodyFont:  { family: 'JetBrains Mono', size: 10 },
          callbacks: {
            afterBody: (items) => {
              const i = items[0].dataIndex;
              const p = topProducts[i];
              const sign = p.pctChange > 0 ? '+' : '';
              return [`Change: ${sign}${p.pctChange}%`];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 9 } },
          grid:  { color: 'rgba(255,255,255,.04)' },
        },
        y: {
          ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 9 } },
          grid:  { color: 'rgba(255,255,255,.04)' },
        }
      }
    }
  });

  // populate recs now that DOM is rendered
  buildRecs();
}
</script>
</body>
</html>
