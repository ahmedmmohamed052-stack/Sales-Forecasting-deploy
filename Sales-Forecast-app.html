<!DOCTYPE html>
<html>
<head>
  <title>Sales Forecasting Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <style>
    :root {
      --bg: #03040a;
      --surface: #080c18;
      --card: #0b0f1e;
      --border: rgba(255,255,255,0.06);
      --accent1: #7c3aff;
      --accent2: #06b6d4;
      --accent3: #f0abfc;
      --accent4: #34d399;
      --accent5: #fb923c;
      --text: #f1f5f9;
      --muted: #64748b;
      --glow1: rgba(124,58,255,0.4);
      --glow2: rgba(6,182,212,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* ── BACKGROUND: Neural Network Grid ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }

    /* Animated SVG neural net */
    #neural-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0.18;
    }

    /* Gradient orbs — more subtle, refined */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.35;
      animation: drift 16s ease-in-out infinite alternate;
    }
    .orb-1 { width:600px;height:600px;background:radial-gradient(circle,#7c3aff,transparent 70%);top:-20%;left:-15%;animation-delay:0s; }
    .orb-2 { width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-15%;right:-10%;animation-delay:-5s; }
    .orb-3 { width:380px;height:380px;background:radial-gradient(circle,#f0abfc,transparent 70%);top:35%;left:50%;animation-delay:-9s; }
    .orb-4 { width:300px;height:300px;background:radial-gradient(circle,#34d399,transparent 70%);bottom:25%;left:5%;animation-delay:-7s; }

    @keyframes drift {
      0%   { transform:translate(0,0) scale(1); }
      50%  { transform:translate(30px,-25px) scale(1.06); }
      100% { transform:translate(-15px,40px) scale(0.94); }
    }

    /* Scanline overlay */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* Noise grain */
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 150px 150px;
    }

    /* ═══════════════════════════════════════
       DATA STREAM — right side decoration
    ═══════════════════════════════════════ */
    .data-stream {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 220px; z-index: 2; pointer-events: none;
      display: flex; flex-direction: column; gap: 0;
      overflow: hidden;
      mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
    }
    .stream-col {
      position: absolute; top: 0; bottom: 0;
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      color: var(--accent2); opacity: 0.25; white-space: nowrap;
      animation: stream-fall linear infinite;
      line-height: 1.6;
      writing-mode: horizontal-tb;
      display: flex; flex-direction: column; gap: 2px;
    }
    @keyframes stream-fall {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    /* Same on left */
    .data-stream-left {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 160px; z-index: 2; pointer-events: none;
      overflow: hidden;
      mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
    }
    .stream-col-l {
      position: absolute; top: 0; bottom: 0;
      font-size: 9px; font-family: 'JetBrains Mono', monospace;
      color: var(--accent1); opacity: 0.18; white-space: nowrap;
      animation: stream-fall linear infinite;
      line-height: 1.8;
      display: flex; flex-direction: column; gap: 2px;
    }

    /* ═══════════════════════════════════════
       CARD
    ═══════════════════════════════════════ */
    .card {
      position: relative; z-index: 10;
      width: 460px;
      background: linear-gradient(160deg,
        rgba(11,15,30,0.97) 0%,
        rgba(8,12,24,0.99) 100%
      );
      border: 1px solid rgba(124,58,255,0.2);
      border-radius: 20px;
      padding: 40px 38px 34px;
      box-shadow:
        0 0 0 1px rgba(6,182,212,0.06),
        0 40px 100px rgba(0,0,0,0.7),
        0 0 80px rgba(124,58,255,0.1),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 0 40px rgba(124,58,255,0.03);
      backdrop-filter: blur(32px);
      animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(50px) scale(0.94); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Corner accents — circuit board style */
    .corner {
      position: absolute; width: 24px; height: 24px; pointer-events: none;
    }
    .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--accent1); border-left: 2px solid var(--accent1); border-radius: 20px 0 0 0; }
    .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--accent2); border-right: 2px solid var(--accent2); border-radius: 0 20px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--accent4); border-left: 2px solid var(--accent4); border-radius: 0 0 0 20px; }
    .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent3); border-right: 2px solid var(--accent3); border-radius: 0 0 20px 0; }

    /* ── Header ── */
    .header-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 6px;
    }

    .logo-area { display: flex; align-items: center; gap: 14px; }

    /* Hexagon logo */
    .logo-hex {
      width: 48px; height: 48px; position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-hex svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .logo-hex-inner {
      position: relative; z-index: 1; font-size: 20px;
    }

    .title-block { display: flex; flex-direction: column; gap: 2px; }

    h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent1) 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1;
    }

    .subtitle {
      font-size: 9px; color: var(--muted); letter-spacing: 0.2em;
      text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    }

    /* Status badge */
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 20px;
      font-size: 9px; color: var(--accent4);
      letter-spacing: 0.15em; text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent4);
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 6px var(--accent4);
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Divider with label ── */
    .divider-row {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 24px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,255,0.3), transparent);
    }
    .divider-label {
      font-size: 9px; color: rgba(100,116,139,0.6);
      letter-spacing: 0.2em; text-transform: uppercase;
      white-space: nowrap;
    }

    /* ═══════════════════════════════════════
       👁 EYE — Redesigned: AI Core aesthetic
    ═══════════════════════════════════════ */
    .eye-container {
      display: flex; justify-content: center; align-items: center;
      margin-bottom: 26px; position: relative;
    }

    /* Outer ring decorations */
    .eye-orbit {
      position: relative;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Spinning outer ring */
    .eye-orbit::before {
      content: '';
      position: absolute; inset: -18px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: var(--accent1);
      border-right-color: transparent;
      border-bottom-color: var(--accent2);
      border-left-color: transparent;
      animation: orbit-spin 4s linear infinite;
    }
    .eye-orbit::after {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 1px dashed rgba(240,171,252,0.2);
      animation: orbit-spin 8s linear infinite reverse;
    }
    @keyframes orbit-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Hex ring */
    .eye-hex-ring {
      position: absolute; inset: -28px;
      animation: orbit-spin 20s linear infinite;
    }

    .eye-wrap {
      position: relative;
      width: 110px; height: 110px;
    }

    /* Pulse rings */
    .eye-wrap::before, .eye-wrap::after {
      content: '';
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(124,58,255,0.2);
      animation: eye-ring-pulse 2.8s ease-in-out infinite;
    }
    .eye-wrap::before { inset: -16px; animation-delay: 0s; }
    .eye-wrap::after {
      inset: -30px;
      border-color: rgba(6,182,212,0.12);
      animation-delay: 0.7s;
    }
    @keyframes eye-ring-pulse {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.03); }
    }

    /* Main eyeball — cooler, more tech */
    .eyeball {
      width: 110px; height: 110px; border-radius: 50%;
      position: relative; overflow: hidden;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%,
          #c4b5fd 0%,
          #7c3aff 25%,
          #312e81 50%,
          #0f0a23 75%,
          #050310 100%
        );
      box-shadow:
        0 0 0 2px rgba(124,58,255,0.5),
        0 0 30px rgba(124,58,255,0.5),
        0 0 60px rgba(6,182,212,0.2),
        inset 0 0 30px rgba(0,0,0,0.6),
        inset 0 2px 6px rgba(255,255,255,0.06);
      transform-style: preserve-3d;
      transition: transform 0.08s linear;
    }

    /* Iris — geometric/data-like */
    .iris {
      position: absolute;
      width: 54%; height: 54%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: conic-gradient(
        var(--accent1) 0deg, rgba(124,58,255,0.3) 45deg,
        var(--accent2) 90deg, rgba(6,182,212,0.3) 135deg,
        var(--accent3) 180deg, rgba(240,171,252,0.3) 225deg,
        var(--accent4) 270deg, rgba(52,211,153,0.3) 315deg,
        var(--accent1) 360deg
      );
      box-shadow:
        0 0 12px rgba(124,58,255,0.7),
        0 0 24px rgba(6,182,212,0.3),
        inset 0 0 12px rgba(0,0,0,0.5);
      animation: iris-rotate 5s linear infinite;
      z-index: 1;
    }
    @keyframes iris-rotate {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }
    .iris::after {
      content: ''; position: absolute; inset: 20%; border-radius: 50%;
      background: radial-gradient(circle, rgba(5,3,16,0.9) 0%, rgba(10,5,30,0.5) 60%, transparent 100%);
    }

    /* Iris inner pattern — circuit rings */
    .iris::before {
      content: ''; position: absolute;
      inset: 5%; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      animation: iris-rotate 3s linear infinite reverse;
    }

    /* Pupil */
    .pupil-wrap {
      position: absolute;
      width: 54%; height: 54%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 2;
      transition: transform 0.07s linear;
      will-change: transform;
    }
    .pupil {
      position: absolute;
      width: 42%; height: 42%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 28%, #1a0a3d 0%, #06021a 45%, #000 100%);
      box-shadow: 0 0 10px rgba(0,0,0,1), inset 0 0 8px rgba(0,0,0,1);
      z-index: 2;
    }
    .pupil::before {
      content: '';
      position: absolute;
      width: 30%; height: 30%; top: 12%; left: 18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(196,181,253,0.6) 55%, transparent 100%);
      filter: blur(0.5px);
    }
    .pupil::after {
      content: '';
      position: absolute;
      width: 14%; height: 14%; bottom: 18%; right: 16%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.9) 0%, transparent 100%);
      filter: blur(0.5px);
    }

    /* Eyelids */
    .eyelid-top, .eyelid-bottom {
      position: absolute; width: 112%; left: -6%;
      border-radius: 50%; pointer-events: none; z-index: 4;
    }
    .eyelid-top {
      height: 55%; top: -4%;
      background: radial-gradient(ellipse at 50% 8%, rgba(3,4,10,1) 0%, rgba(3,4,10,0.65) 50%, transparent 100%);
    }
    .eyelid-bottom {
      height: 55%; bottom: -4%;
      background: radial-gradient(ellipse at 50% 92%, rgba(3,4,10,0.95) 0%, rgba(3,4,10,0.55) 50%, transparent 100%);
    }

    /* Veins */
    .eyeball::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background:
        radial-gradient(ellipse 2px 40% at 16% 50%, rgba(124,58,255,0.25) 0%, transparent 100%),
        radial-gradient(ellipse 2px 35% at 84% 44%, rgba(6,182,212,0.2) 0%, transparent 100%),
        radial-gradient(ellipse 36% 2px at 50% 16%, rgba(240,171,252,0.15) 0%, transparent 100%),
        radial-gradient(ellipse 28% 2px at 58% 82%, rgba(52,211,153,0.18) 0%, transparent 100%);
      pointer-events: none; z-index: 3;
    }

    /* ── Metrics row — above tabs ── */
    .metrics-row {
      display: flex; gap: 8px; margin-bottom: 22px;
    }
    .metric-pill {
      flex: 1; padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      display: flex; flex-direction: column; gap: 3px;
      transition: border-color 0.2s, background 0.2s;
    }
    .metric-pill:hover {
      border-color: rgba(124,58,255,0.25);
      background: rgba(124,58,255,0.05);
    }
    .metric-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 1px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .metric-lbl {
      font-size: 8px; color: var(--muted);
      letter-spacing: 0.15em; text-transform: uppercase;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: rgba(255,255,255,0.03);
      border-radius: 12px; padding: 3px; margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .tab-btn {
      flex: 1; padding: 9px; border: none; background: transparent;
      color: var(--muted); font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
      cursor: pointer; border-radius: 10px; transition: all 0.25s;
      text-transform: uppercase;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent1), #5b21b6);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,255,0.35);
    }

    /* ── Fields ── */
    .field { margin-bottom: 16px; position: relative; }
    .field label {
      display: flex; align-items: center; gap: 6px;
      font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 7px;
    }
    .label-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(124,58,255,0.2), transparent);
    }
    .field-wrap { position: relative; display: flex; align-items: center; }
    .field-icon {
      position: absolute; left: 14px; font-size: 14px;
      opacity: 0.4; pointer-events: none; transition: opacity 0.2s;
    }
    .field input {
      width: 100%; padding: 12px 16px 12px 42px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: all 0.25s;
    }
    .field input::placeholder { color: rgba(100,116,139,0.4); }
    .field input:focus {
      background: rgba(124,58,255,0.05);
      border-color: rgba(124,58,255,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,255,0.1), 0 0 20px rgba(124,58,255,0.06);
    }
    .field-wrap:focus-within .field-icon { opacity: 0.8; }

    /* ── Button ── */
    .btn-row { margin-bottom: 18px; }
    button {
      cursor: pointer; font-family: 'JetBrains Mono', monospace;
      font-weight: 500; letter-spacing: 0.06em;
      border: none; border-radius: 10px; transition: all 0.22s;
    }
    .btn-primary {
      width: 100%; padding: 13px;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--accent1) 0%, #5b21b6 50%, var(--accent2) 100%);
      background-size: 200% 200%;
      color: #fff; font-size: 13px;
      box-shadow: 0 6px 28px rgba(124,58,255,0.35);
      animation: grad-shift 5s ease infinite;
      text-transform: uppercase; letter-spacing: 0.15em;
    }

    /* Shimmer sweep */
    .btn-primary::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      animation: btn-shimmer 3s ease-in-out infinite;
    }
    @keyframes btn-shimmer {
      0%,100% { left: -100%; }
      50%      { left: 150%; }
    }

    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1); opacity: 0; transition: opacity 0.2s;
    }
    .btn-primary:hover::after { opacity: 1; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(124,58,255,0.5); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    @keyframes grad-shift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* Hidden elements kept intact */
    #tokenBox { display: none; }
    #token-section { display: none; }
    #api-btn { display: none; }

    /* ── Message ── */
    #msg {
      font-size: 11px; letter-spacing: 0.05em; min-height: 18px;
      text-align: center; padding: 0 4px; transition: all 0.3s;
      font-family: 'JetBrains Mono', monospace;
    }
    #msg.success { color: var(--accent4); }
    #msg.error   { color: #f87171; }
    #msg.loading { color: var(--accent2); }

    /* ── Footer ── */
    .footer {
      margin-top: 20px; text-align: center; font-size: 9px;
      color: rgba(100,116,139,0.35); letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .footer-dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(124,58,255,0.4);
    }

    /* ── Particles ── */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--accent1); animation: float-up linear infinite; opacity: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(100vh); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    /* ── Confirm field ── */
    #confirm-field { display: none; }

    /* ══════════════════════════════════════════
       📈 FORECAST MINI CHART — below eye, above metrics
    ══════════════════════════════════════════ */
    .forecast-strip {
      position: relative;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 10px 14px 8px;
      overflow: hidden;
    }

    .forecast-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .forecast-title {
      font-size: 8px; color: var(--muted);
      letter-spacing: 0.2em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;

    .forecast-title::before {
      content: '';
      width: 6px; height: 6px; border-radius: 1px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: inline-block;
    }
    .forecast-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px; letter-spacing: 1px;
      color: var(--accent4);
    }
    .forecast-delta {
      font-size: 8px; color: var(--accent4);
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 20px; padding: 1px 6px;
      letter-spacing: 0.05em;
    }

    /* SVG chart */
    #forecast-svg {
      width: 100%; height: 52px; display: block; overflow: visible;
    }

    /* Animated draw-on line */
    .fc-line-hist {
      fill: none;
      stroke: var(--accent1);
      stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .fc-line-pred {
      fill: none;
      stroke: var(--accent2);
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
      stroke-linecap: round; stroke-linejoin: round;
      animation: dash-march 1.2s linear infinite;
    }
    @keyframes dash-march {
      to { stroke-dashoffset: -14; }
    }
    .fc-area {
      fill: url(#fcGrad);
      opacity: 0.25;
    }
    .fc-dot {
      fill: var(--accent2);
      animation: dot-pulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 4px var(--accent2));
    }
    @keyframes dot-pulse {
      0%,100% { r: 2.5; opacity: 1; }
      50%      { r: 4;   opacity: 0.6; }
    }

    /* Confidence band */
    .fc-band {
      fill: rgba(6,182,212,0.06);
      stroke: rgba(6,182,212,0.12);
      stroke-width: 0.5;
    }

    /* Month labels */
    .fc-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 6.5px; fill: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Vertical now-line */
    .fc-now-line {
      stroke: rgba(240,171,252,0.4);
      stroke-width: 1;
      stroke-dasharray: 2 3;
    }

    /* Glow sweep on chart */
    .forecast-strip::after {
      content: '';
      position: absolute; top: 0; left: -60%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(124,58,255,0.04), transparent);
      animation: chart-sweep 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes chart-sweep {
      0%   { left: -60%; }
      100% { left: 110%; }
    }

    /* ══════════════════════════════════════════
       📊 TICKER — side panel fixed left of card
    ══════════════════════════════════════════ */
    .ticker-panel {
      position: fixed;
      left: calc(50% - 310px - 120px);
      top: 50%;
      transform: translateY(-50%);
      z-index: 9;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;

    .ticker-card {
      width: 108px;

      border-radius: 10px; padding: 10px 12px;
      backdrop-filter: blur(16px);
      animation: ticker-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .ticker-card:nth-child(2) { animation-delay: 0.1s; }
    .ticker-card:nth-child(3) { animation-delay: 0.2s; }
    .ticker-card:nth-child(4) { animation-delay: 0.3s; }
    @keyframes ticker-in {
      from { opacity:0; transform: translateX(-20px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .ticker-name {
      font-size: 8px; color: var(--muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 5px;

    .ticker-num {

    .tc-up   { color: var(--accent4); }

    .tick-spark { display: block; margin-top: 5px; width: 100%; height: 18px; }

    @media (max-width: 900px) { .ticker-panel { display: none; } }
  </style>
</head>

<script>
  /* ══════════════════════════════════════════════
     🧠 Neural Network Background
  ══════════════════════════════════════════════ */
  (function buildNeural() {
    const svg = document.getElementById('neural-svg');
    const W = 1200, H = 700;
    const nodes = [];
    const count = 40;

    // Layers
    const layers = [5, 8, 10, 8, 5, 4];
    let allNodes = [];
    const layerX = [80, 240, 400, 600, 800, 1000, 1120];

    layers.forEach((n, li) => {
      for (let i = 0; i < n; i++) {
        const x = layerX[li] + (Math.random() - 0.5) * 30;
        const y = (H / (n + 1)) * (i + 1) + (Math.random() - 0.5) * 20;
        allNodes.push({ x, y, li });
      }
    });

    // Lines between adjacent layers
    const colors = ['#7c3aff','#06b6d4','#f0abfc','#34d399','#fb923c'];
    let svgHTML = '';

    for (let i = 0; i < allNodes.length; i++) {
      for (let j = i + 1; j < allNodes.length; j++) {
        const a = allNodes[i], b = allNodes[j];
        if (Math.abs(a.li - b.li) === 1) {
          if (Math.random() < 0.45) {
            const col = colors[Math.floor(Math.random() * colors.length)];
            const dur = 2 + Math.random() * 4;
            const delay = Math.random() * 4;
            svgHTML += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
              stroke="${col}" stroke-width="0.5" stroke-opacity="0.35"
              style="animation: neural-pulse ${dur}s ${delay}s ease-in-out infinite alternate"/>`;
          }
        }
      }
    }

    // Nodes
    allNodes.forEach(n => {
      const col = colors[Math.floor(Math.random() * colors.length)];
      const r = 2 + Math.random() * 2;
      const dur = 1.5 + Math.random() * 3;
      svgHTML += `<circle cx="${n.x}" cy="${n.y}" r="${r}"
        fill="${col}" opacity="0.7"
        style="animation: node-pulse ${dur}s ${Math.random()*3}s ease-in-out infinite alternate"/>`;
    });

    svg.innerHTML += svgHTML;

    // CSS for neural animations
    const style = document.createElement('style');
    style.textContent = `
      @keyframes neural-pulse {
        0%   { stroke-opacity: 0.1; }
        100% { stroke-opacity: 0.6; }
      }
      @keyframes node-pulse {
        0%   { opacity: 0.3; r: 1.5; }
        100% { opacity: 0.9; r: 3; }
      }
    `;
    document.head.appendChild(style);
  })();

  /* ══════════════════════════════════════════════
     📊 Data Streams
  ══════════════════════════════════════════════ */
  (function buildStreams() {
    const chars = '01アイウエオ∇∑∫αβΔ→←↑↓∞≈⊕⊗∂∈∅≠≤≥';
    const keywords = ['TRAIN','INFER','LOSS','GRAD','EPOCH','BATCH','LR','ACC','F1','AUC','MSE','RMSE'];

    function makeCol(container, isLeft) {
      const cols = isLeft ? 3 : 4;
      const colW = (isLeft ? 160 : 220) / cols;
      for (let c = 0; c < cols; c++) {
        const el = document.createElement('div');
        el.className = isLeft ? 'stream-col-l' : 'stream-col';
        el.style.left = (c * colW + 10) + 'px';
        el.style.animationDuration = (10 + Math.random() * 14) + 's';
        el.style.animationDelay = -(Math.random() * 20) + 's';

        let content = '';
        for (let i = 0; i < 60; i++) {
          if (Math.random() < 0.08) {
            content += keywords[Math.floor(Math.random() * keywords.length)] + '\n';
          } else {
            content += chars[Math.floor(Math.random() * chars.length)] + '\n';
          }
        }
        el.style.whiteSpace = 'pre';
        el.textContent = content;
        container.appendChild(el);
      }
    }

    makeCol(document.getElementById('data-stream-right'), false);
    makeCol(document.getElementById('data-stream-left'), true);
  })();

  /* ══════════════════════════════════════════════
     👁  Eye follows mouse
  ══════════════════════════════════════════════ */
  const eyeball   = document.getElementById('eyeball');
  const pupilWrap = document.getElementById('pupilWrap');
  const MAX_MOVE  = 18;

  document.addEventListener('mousemove', (e) => {
    const rect  = eyeball.getBoundingClientRect();
    const eyeCX = rect.left + rect.width  / 2;
    const eyeCY = rect.top  + rect.height / 2;
    const dx    = e.clientX - eyeCX;
    const dy    = e.clientY - eyeCY;
    const dist  = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const maxDist   = Math.max(window.innerWidth, window.innerHeight) * 0.5;
    const intensity = Math.min(dist / maxDist, 1);
    const moveX     = Math.cos(angle) * MAX_MOVE * intensity;
    const moveY     = Math.sin(angle) * MAX_MOVE * intensity;
    pupilWrap.style.transform = `translate(calc(-50% + ${moveX}%), calc(-50% + ${moveY}%))`;
    const tiltX = (moveY * 0.12).toFixed(2);
    const tiltY = (moveX * -0.12).toFixed(2);
    eyeball.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  });

  document.addEventListener('mouseleave', () => {
    pupilWrap.style.transform = 'translate(-50%, -50%)';
    eyeball.style.transform   = 'rotateX(0deg) rotateY(0deg)';
  });

  /* ══════════════════════════════════════════════

  /* ══════════════════════════════════════════════

      mainBtn.onclick            = signup;

      confirmField.style.display = 'block';
    }
  }

  /* ══════════════════════════════════════════════
     Particles
  ══════════════════════════════════════════════ */
  const pColors   = ['#7c3aff','#06b6d4','#f0abfc','#34d399','rgba(255,255,255,0.6)'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left              = Math.random() * 100 + 'vw';
    p.style.animationDuration = (10 + Math.random() * 16) + 's';
    p.style.animationDelay    = (Math.random() * 16) + 's';
    p.style.background        = pColors[Math.floor(Math.random() * pColors.length)];
    p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '1px';
    container.appendChild(p);
  }

  /* ══════════════════════════════════════════════
     Helpers
  ══════════════════════════════════════════════ */
  function setMsg(text, type = '') {
    const el = document.getElementById('msg');
    el.className = type;
    el.innerText = text;
  }

  function setLoading(state) {
    const btn = document.getElementById('main-btn');
    btn.disabled    = state;
    btn.textContent = state
      ? '⏳ Processing...'
      : (currentTab === 'login' ? 'Login →' : 'Create Account →');
  }

  /* ══════════════════════════════════════════════
     🗄️  Save to MySQL
  ══════════════════════════════════════════════ */
  async function saveUserToDB(uid, email, displayName = null) {
    try {
      const res = await fetch(`${API_BASE}/internal/register-user`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ uid, email, display_name: displayName }),
      });
      if (!res.ok) console.warn('DB warning:', await res.text());
    } catch (err) {
      console.error('DB save failed:', err);
    }
  }

  /* ══════════════════════════════════════════════
     ✅  Sign Up
  ══════════════════════════════════════════════ */
  async function signup() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm-password').value;
    if (!email || !password || !confirm) { setMsg('❌ Please fill in all fields', 'error'); return; }
    if (password !== confirm) {
      setMsg('❌ Passwords do not match', 'error');
      return;
    }

    setLoading(true);
    setMsg('Creating account...', 'loading');
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.sendEmailVerification();
      await saveUserToDB(cred.user.uid, cred.user.email, cred.user.displayName);
      setMsg('📩 Account created! Check your email to verify.', 'success');
    } catch (err) {
      setMsg('❌ ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  /* ══════════════════════════════════════════════
     🔐  Login
  ══════════════════════════════════════════════ */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.className = "loading";
  msg.innerText = "Logging in...";

  try {
    const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
    const user = userCredential.user;

    // ❗ مهم: تأكد إنه verified
    if (!user.emailVerified) {
      msg.className = "error";
      msg.innerText = "❌ Verify your email first";
      return;
    }

    // 🔥 خد token جديد دايمًا
    const token = await user.getIdToken(true);

    localStorage.setItem("token", token);

    msg.className = "success";
    msg.innerText = "Login successful";

    window.location.href = "dashboard.html";

  } catch (err) {
    msg.className = "error";
    msg.innerText = err.message;
  }
}

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function toggleConfirm() {
    const input = document.getElementById('confirm-password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

     baseline_rmse : 18.143

  (function initTicker() {

    document.getElementById('tk-rmse-delta').textContent = '▼ val rmse';
    document.getElementById('tk-rmse-delta').className   = 'ticker-change tc-up';

    document.getElementById('tk-conf').textContent  = '89.78%';
    document.getElementById('tk-conf-delta').textContent = '▲ composite';
    document.getElementById('tk-conf-delta').className   = 'ticker-change tc-up';

    document.getElementById('tk-base').textContent  = '18.14';
    document.getElementById('tk-base-delta').textContent = '— baseline ref';
    document.getElementById('tk-base-delta').className   = 'ticker-change';
    document.getElementById('tk-base-delta').style.color = 'var(--muted)';

    // Static sparklines reflecting the relative model improvement
    document.getElementById('spark-acc').setAttribute('points',  '0,14 12,12 24,10 36,8 48,6 60,5 72,4 84,2');
    document.getElementById('spark-rmse').setAttribute('points', '0,2  12,4  24,5  36,7 48,9 60,11 72,13 84,15');
