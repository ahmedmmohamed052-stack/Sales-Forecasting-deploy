<!DOCTYPE html>
<html>
<head>
  <title>Auth</title>

  <!-- Firebase v8 (مستقر وسهل) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>

<h2>Sign Up / Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<textarea id="tokenBox" rows="6" cols="60" placeholder="Token will appear here"></textarea>
<button onclick="goDocs()">Go to API</button>
<p id="msg"></p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTi0hycT_nCgThOoLDLDfXhCuLWeKcPMU",
  authDomain: "sales-forecasting-75f26.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signup() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(userCredential => {

      // ✅ ابعت verification email
      userCredential.user.sendEmailVerification();

      msg.innerText = "Check your email to verify 📩";

    })
    .catch(err => {
      msg.innerText = err.message;
    });
}

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(async (userCredential) => {

      const user = userCredential.user;

      // ❗ تأكد من verification
      if (!user.emailVerified) {
        msg.innerText = "Verify your email first ❌";
        return;
      }

      // ✅ خد التوكن
    const token = await user.getIdToken();

// 👇 يظهر التوكن في مربع
    document.getElementById("tokenBox").value = token;

// 👇 يخزنه
    localStorage.setItem("token", token);

// 👇 متحولش فورًا (عشان تلحق تنسخ)


    })
    .catch(err => {
      msg.innerText = err.message;
    });
}
function goDocs() {
    window.location.href = "http://127.0.0.1:8001/docs";
}


</script>

</body>
</html>
